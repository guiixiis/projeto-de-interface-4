```

<!-- FORMULÁRIO -->

<section class="container py-5">

```
<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow">

            <div class="card-body p-4">

                <h2 class="text-center mb-4">
                    Formulário de Contato
                </h2>

                <form>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <label class="form-label">
                                Nome
                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Digite seu nome"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                E-mail
                            </label>

                            <input type="email"
                                   class="form-control"
                                   placeholder="Digite seu e-mail"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Telefone
                            </label>

                            <input type="tel"
                                   class="form-control"
                                   placeholder="(61) 99999-9999">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">
                                Assunto
                            </label>

                            <input type="text"
                                   class="form-control"
                                   placeholder="Informe o assunto">
                        </div>

                        <div class="col-12">
                            <label class="form-label">
                                Mensagem
                            </label>

                            <textarea class="form-control"
                                      rows="5"
                                      placeholder="Digite sua mensagem"
                                      required></textarea>
                        </div>

                        <div class="col-12 text-center">

                            <button type="submit"
                                    class="btn btn-primary btn-lg px-5">
                                Enviar Mensagem
                            </button>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>
```

</section>
